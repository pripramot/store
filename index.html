<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>บทบรรณาธิการเนติฯ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

  <!-- ส่วนหัวเมนู -->
  <nav class="bg-gray-800 border-b border-gray-700">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-yellow-300">เนติบัณฑิตไทย</h1>
      <ul class="flex space-x-6 text-sm text-gray-300">
        <li><a href="#" class="hover:text-yellow-300">หน้าแรก</a></li>
        <li><a href="#" class="hover:text-yellow-300">บทบรรณาธิการ</a></li>
        <li><a href="#" class="hover:text-yellow-300">เกี่ยวกับ</a></li>
      </ul>
    </div>
  </nav>

  <!-- ภาพแบนเนอร์ -->
  <section class="w-full">
    <img src="banner.jpg" alt="ภาพเกี่ยวกับกฎหมาย" class="w-full h-[600px] object-cover max-h-[600px] sm:h-[400px] sm:max-h-[400px] md:h-[500px] md:max-h-[500px] lg:h-[600px] lg:max-h-[600px]">
  </section>

  <!-- ช่องค้นหา -->
  <header class="text-center py-6 border-b border-gray-700">
    <h2 class="text-2xl font-semibold text-blue-300">รวมบทบรรณาธิการเนติบัณฑิต ภาค 1–78</h2>
    <p class="text-sm text-gray-400">เรียบเรียงเพื่อการศึกษาและอ้างอิงทางกฎหมาย</p>
    <div class="mt-4">
      <input id="searchInput" type="text" placeholder="ค้นหาภาค เช่น ภาค 45" class="px-4 py-2 rounded bg-gray-800 text-gray-100 border border-gray-600 w-64">
    </div>
  </header>

  <!-- เนื้อหาบทบรรณาธิการ -->
  <main class="max-w-4xl mx-auto px-4 py-8" id="editorialContainer">
    <!-- บทบรรณาธิการจะถูกแสดงที่นี่ -->
  </main>

  <!-- ส่วนท้าย -->
  <footer class="text-center text-xs text-gray-500 py-6 border-t border-gray-700">
    © 2025 โดย Jiraphinya | สำหรับการศึกษาและอ้างอิงทางกฎหมาย
  </footer>

  <!-- JavaScript โหลด JSON และแสดงผล -->
  <script>
    let editorials = [];

    async function loadJSON() {
      const res = await fetch('editorials.json');
      editorials = await res.json();
      renderEditorials(editorials);
    }

    function renderEditorials(data) {
      const container = document.getElementById('editorialContainer');
      container.innerHTML = '';
      data.forEach(item => {
        container.innerHTML += `
          <section class="bg-gray-800 rounded-lg shadow-md p-6 mb-6 border border-gray-700">
            <h3 class="text-xl font-bold text-yellow-300 mb-2">${item.editorial_title}</h3>
            <div class="text-sm text-gray-400 mb-4">เล่มที่ ${item.volume} | ${item.section} | หน้า ${item.page_range}</div>
            <p class="text-gray-200 whitespace-pre-line">${item.content}</p>
            <div class="mt-4">
              <h4 class="text-sm font-semibold text-gray-300">คำสำคัญ:</h4>
              <div class="flex flex-wrap gap-2 mt-2">
                ${item.keywords.map(k => `<span class="bg-gray-700 text-sm px-3 py-1 rounded-full">${k}</span>`).join('')}
              </div>
            </div>
            <div class="mt-4">
              <h4 class="text-sm font-semibold text-gray-300">อ้างอิง:</h4>
              <ul class="list-disc list-inside text-gray-400 mt-2">
                ${item.references.map(r => `<li>${r}</li>`).join('')}
              </ul>
            </div>
          </section>
        `;
      });
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
      const keyword = e.target.value.trim();
      const filtered = editorials.filter(item => item.section.includes(keyword));
      renderEditorials(filtered);
    });

    loadJSON();
  </script>
</body>
</html>
